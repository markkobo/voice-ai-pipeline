global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'voice-ai-pipeline'
    static_configs:
      - targets: ['host.docker.internal:9090']
        labels:
          service: 'voice-ai-pipeline'
    # If running locally without docker, use:
    # - targets: ['localhost:9090']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
