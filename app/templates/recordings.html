<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recordings — EverHome</title>
    <link rel="stylesheet" href="/static/css/_status_bar.css">
    <link rel="stylesheet" href="/static/css/recordings.css">
    <script src="/static/js/_status_bar.js" defer></script>

</head>
<body>
    {% include "_status_bar.html" %}
    <!-- Toast notifications container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal for adding persona/listener -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <h3 id="modalTitle">Add</h3>
            <div class="modal-field">
                <label for="modalInput">Display Name</label>
                <input type="text" id="modalInput" placeholder="e.g. Mom, Lily">
            </div>
            <div class="modal-field">
                <label for="modalIdInput">ID <span class="modal-hint">(lowercase letters, digits, underscores; start with a letter)</span></label>
                <input type="text" id="modalIdInput" placeholder="e.g. mom, grandma_lily">
            </div>
            <div class="modal-field modal-field-persona" id="modalFieldIsFamily">
                <label class="modal-checkbox-label">
                    <input type="checkbox" id="modalIsFamily" checked>
                    <span>Family member (is_family)</span>
                </label>
            </div>
            <div class="modal-field modal-field-listener" id="modalFieldEmotion">
                <label for="modalEmotionSelect">Default Emotion</label>
                <select id="modalEmotionSelect">
                    <option value="溫和">Gentle</option>
                    <option value="撒嬌">Playful</option>
                    <option value="寵溺">Loving</option>
                    <option value="幽默">Humorous</option>
                    <option value="毒舌">Sassy</option>
                    <option value="開心">Happy</option>
                    <option value="認真">Serious</option>
                    <option value="默認">Default</option>
                </select>
            </div>
            <div class="modal-error" id="modalError"></div>
            <div class="modal-actions">
                <button class="action-btn" style="background:#666" onclick="closeModal()">Cancel</button>
                <button class="action-btn play" id="modalConfirmBtn" onclick="confirmModal()">Confirm</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <a href="/ui" class="back-btn">← Back to Chat</a>
            <h1>Recordings</h1>
            <div class="header-actions">
                <button class="action-btn" id="backupBtn" onclick="triggerBackup()" style="background:#2a7;">📤 Backup to R2</button>
                <a href="/ui/training" class="back-btn">To Training →</a>
                <div class="version-selector">
                    <span>Version:</span>
                    <select id="versionSelect">
                        <option value="default">System Default</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- WebRTC Recording Section -->
        <div class="recording-section">
            <div class="section-title">🎤 Record (WebRTC)</div>

            <div class="recorder" id="recorder">
                <!-- dB Meter -->
                <div class="db-meter">
                    <div class="db-meter-fill" id="dbMeterFill"></div>
                </div>
                <div class="db-info">
                    <span id="dbLevel">-∞ dB</span>
                    <span id="qualityIndicator">Waiting for recording...</span>
                </div>

                <!-- Metadata selectors -->
                <div class="metadata-selectors">
                    <div class="selector-group">
                        <label>👤 Listener</label>
                        <div class="selector-row">
                            <select id="listenerSelect"></select>
                            <button type="button" class="add-btn add-btn-inline" onclick="openAddListenerModal()" title="Add Listener" aria-label="Add Listener">+</button>
                        </div>
                    </div>
                    <div class="selector-group">
                        <label>🎭 Persona</label>
                        <div class="selector-row">
                            <select id="personaSelect"></select>
                            <button type="button" class="add-btn add-btn-inline" onclick="openAddPersonaModal()" title="Add Persona" aria-label="Add Persona">+</button>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="recorder-controls">
                    <button class="rec-btn" id="recBtn">
                        <span id="recIcon">●</span>
                        <span id="recText">Start Recording</span>
                    </button>
                    <span class="duration" id="duration">00:00</span>
                </div>
            </div>

            <!-- File Upload -->
            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" accept=".wav,.mp3,.m4a,.webm" multiple>
                <div class="upload-icon">📁</div>
                <div class="upload-text">
                    Drag files here or <strong>click to select</strong><br>
                    <small>Supported: WAV, MP3, M4A, WebM (max 500MB)</small>
                </div>
            </div>
        </div>

        <!-- Debug Panel -->
        <div class="debug-panel" id="debugPanel">
            <div class="debug-panel-header">
                <span>📋 Debug Panel</span>
                <button class="debug-toggle" id="debugToggle">Collapse</button>
            </div>
            <div id="debugLogs"></div>
        </div>

        <!-- Recordings List with Tree View -->
        <div class="recording-section">
            <div class="section-title">📚 Recordings</div>

            <!-- Filter bar -->
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="Search recordings..." oninput="filterAndRender()">
                <select id="listenerFilter" onchange="filterAndRender()">
                    <option value="">All Listeners</option>
                </select>
            </div>

            <!-- Tree view container -->
            <div class="tree-view" id="treeView">
                <div class="empty-state">Loading...</div>
            </div>
        </div>
    </div>

    <script src="/static/js/recordings.js" defer></script>

</body>
</html>
