<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訓練管理 - Voice AI</title>
    <link rel="stylesheet" href="/static/css/_status_bar.css">
    <link rel="stylesheet" href="/static/css/training.css">
    <script src="/static/js/_status_bar.js" defer></script>
</head>
<body>
    {% include "_status_bar.html" %}
    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <div class="header">
            <a href="/ui" class="back-btn">跳轉到對話</a>
            <h1>訓練管理</h1>
            <a href="/ui/recordings" class="back-btn">錄音管理</a>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('training')">訓練</button>
            <button class="tab" onclick="switchTab('versions')">版本</button>
        </div>

        <!-- Training Tab -->
        <div id="training-tab">
            <!-- Persona Selection -->
            <div class="section">
                <div class="section-title">選擇人格</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>人格 (Persona)</label>
                        <select id="personaSelect"></select>
                    </div>
                </div>
            </div>

            <!-- Recordings Selection with Tree View -->
            <div class="section">
                <div class="section-title">選擇片段</div>
                <div class="filter-bar">
                    <select id="listenerFilter">
                        <option value="">全部聆聽者</option>
                    </select>
                    <span id="recordingsCount" class="recordings-count"></span>
                </div>
                <div id="treeView">
                    <div class="empty-state">載入中...</div>
                </div>
            </div>

            <!-- Training Settings -->
            <div class="section">
                <div class="section-title">訓練設定</div>
                <div class="training-settings">
                    <div class="settings-grid">
                        <div class="form-group">
                            <label>訓練類型</label>
                            <select id="trainingTypeSelect" onchange="onTrainingTypeChange()">
                                <option value="sft" selected>SFT (推薦, 穩定)</option>
                                <option value="lora">LoRA (experimental — 目前易產生雜音)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Epochs</label>
                            <select id="epochsSelect">
                                <option value="5">5</option>
                                <option value="10">10</option>
                                <option value="20">20</option>
                                <option value="30" selected>30</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                        </div>
                        <div class="form-group" id="rankGroup" style="display:none;">
                            <label>LoRA Rank</label>
                            <select id="rankSelect">
                                <option value="4">4</option>
                                <option value="8">8</option>
                                <option value="16">16</option>
                                <option value="32" selected>32</option>
                                <option value="64">64</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Batch Size</label>
                            <select id="batchSizeSelect">
                                <option value="1" selected>1</option>
                                <option value="2">2</option>
                                <option value="4">4</option>
                                <option value="8">8</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label title="決定 Qwen3-TTS 烘焙時要不要鎖定特定語系的 codec 語言 token。「不指定」會把 spk_is_dialect 寫成 false，推論時用原本說話者口音；其他選項會強制走該語言的 codec，可能讓非北京口音聽起來像北京腔。">語言 (Language)</label>
                            <select id="languageTokenSelect">
                                <option value="" selected>不指定（推薦：保留原口音）</option>
                                <option value="chinese" title="可能讓非北京口音聽起來像北京腔">中文（強制北京 codec）</option>
                                <option value="english">英文 (English)</option>
                                <option value="japanese">日文 (Japanese)</option>
                                <option value="korean">韓文 (Korean)</option>
                                <option value="french">法文 (French)</option>
                                <option value="spanish">西文 (Spanish)</option>
                                <option value="german">德文 (German)</option>
                                <option value="italian">義文 (Italian)</option>
                                <option value="portuguese">葡文 (Portuguese)</option>
                                <option value="russian">俄文 (Russian)</option>
                            </select>
                        </div>
                    </div>
                    <div id="loraWarning" style="display:none; margin-top:10px; padding:10px 14px; background:#3a2f10; color:#f4c66a; border-radius:6px; font-size:0.85rem;">
                        ⚠️ <strong>LoRA 目前不穩定</strong>：訓練 forward path 只能訓練到 code_predictor，gradient 訊號不足以收斂，產出常為雜音 / 跑到 max_new_tokens。建議用 SFT。詳見 <code>memory/training_pipeline_deferred.md</code>。
                    </div>
                </div>

                <!-- Training Preview -->
                <div class="training-preview" id="trainingPreview">
                    <h3 style="font-size: 1rem; margin-bottom: 10px; color: #00ccff;">訓練預覽</h3>
                    <div id="previewList">
                        <div class="empty-state">選擇片段以查看預覽</div>
                    </div>
                </div>

                <!-- Progress -->
                <div class="progress-section" id="progressSection">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
                    </div>
                    <div class="progress-stats">
                        <div class="stat-item">
                            <div class="stat-label">Epoch</div>
                            <div class="stat-value" id="statEpoch">0/0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Loss</div>
                            <div class="stat-value" id="statLoss">-</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">預計剩餘</div>
                            <div class="stat-value" id="statETA">-</div>
                        </div>
                    </div>
                </div>

                <button class="btn-primary" id="startTrainingBtn" onclick="startTraining()">
                    開始訓練
                </button>
                <button id="cancelTrainingBtn" onclick="cancelTraining()" style="display:none; margin-top:8px; background:#dc3545; color:#fff; border:none; padding:10px 16px; border-radius:6px; cursor:pointer; font-size:0.9rem;">
                    ✕ 取消訓練
                </button>
            </div>
        </div>

        <!-- Versions Tab -->
        <div id="versions-tab" style="display: none;">
            <div class="section">
                <div class="section-title">版本列表</div>
                <div style="margin-bottom: 12px;">
                    <label style="font-size: 0.85rem; color: #888; display: block; margin-bottom: 6px;">測試文字 (預覽時朗讀)</label>
                    <input type="text" id="previewText" value="你好，這是我的聲音測試。"
                        style="width: 100%; padding: 10px 14px; background: #1a1a2e; color: #fff; border: 1px solid #333; border-radius: 8px; font-size: 14px;">
                </div>
                <div id="versionsList">載入中...</div>
            </div>
        </div>

        <!-- Debug Panel -->
        <div class="debug-panel" id="debugPanel">
            <div id="debugLogs"></div>
        </div>
    </div>

    <script src="/static/js/training.js" defer></script>

</body>
</html>
